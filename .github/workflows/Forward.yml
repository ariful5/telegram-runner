name: Telegram Auto Forward

on:
  workflow_dispatch: {}

concurrency:
  group: telegram-forward
  cancel-in-progress: true

jobs:
  forward:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ariful5/Telegram
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/ariful5/Telegram.git

      - name: Send daily weather update
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_ID_1: ${{ secrets.ADMIN_ID_1 }}
          ADMIN_ID_2: ${{ secrets.ADMIN_ID_2 }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: python weather_notifier.py

      - name: Run bot
        env:
          PYTHONUNBUFFERED: "1"
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          SOURCE_CHANNEL_ID: ${{ secrets.SOURCE_CHANNEL_ID }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_ID_1: ${{ secrets.ADMIN_ID_1 }}
          ADMIN_ID_2: ${{ secrets.ADMIN_ID_2 }}
          TARGET_GROUP_ID: ${{ secrets.TARGET_GROUP_ID }}
          TARGET_TOPIC_ID: ${{ secrets.TARGET_TOPIC_ID }}
        run: python bot.py

      - name: Commit updated state files
        if: always()
        run: |
          git add last_id.json config/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update state: last_id, keys"
          git pull --rebase || true
          git push
          
